<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>俄罗斯方块</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: #000; min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: 'Press Start 2P', cursive; overflow: hidden; touch-action: none; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px); pointer-events: none; z-index: 1000; }
        body::after { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.3) 100%); pointer-events: none; z-index: 999; }
        .game-boy { background: linear-gradient(145deg, #8b8b8b, #6b6b6b); padding: 15px; border-radius: 15px 15px 40px 15px; box-shadow: inset 2px 2px 5px rgba(255,255,255,0.3), inset -2px -2px 5px rgba(0,0,0,0.3), 5px 5px 20px rgba(0,0,0,0.5); margin-top: 10px; }
        .screen-border { background: #333; padding: 8px; border-radius: 10px 10px 30px 10px; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); }
        .screen-inner { background: #0a1a0a; padding: 5px; border-radius: 5px; position: relative; }
        .screen-inner::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, rgba(0,255,0,0.05) 0%, transparent 50%); pointer-events: none; }
        .header { display: flex; justify-content: space-between; margin-bottom: 8px; padding: 5px; }
        .header-item { text-align: center; }
        .header-label { font-size: 6px; color: #0f0; margin-bottom: 3px; text-shadow: 0 0 5px #0f0; }
        .header-value { font-size: 10px; color: #0f0; text-shadow: 0 0 5px #0f0; }
        .game-area { display: flex; gap: 8px; }
        #gameCanvas { background: #001100; border: 2px solid #0f0; image-rendering: pixelated; }
        .preview-box { border: 2px solid #0f0; padding: 3px; background: #001100; }
        .preview-label { color: #0f0; font-size: 5px; text-align: center; margin-bottom: 3px; text-shadow: 0 0 5px #0f0; }
        #previewCanvas { background: #001100; display: block; }
        @keyframes lineClear { 0%, 100% { filter: brightness(1); } 25% { filter: brightness(2) hue-rotate(90deg); } 50% { filter: brightness(3) hue-rotate(180deg); } 75% { filter: brightness(2) hue-rotate(270deg); } }
        .clearing { animation: lineClear 0.3s ease-in-out 3; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 100; }
        .overlay.show { display: flex; }
        .overlay h1 { color: #f00; font-size: 14px; margin-bottom: 20px; text-shadow: 0 0 10px #f00; animation: blink 1s infinite; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        .overlay p { color: #0f0; font-size: 9px; margin-bottom: 30px; text-shadow: 0 0 5px #0f0; }
        .overlay button { background: #0f0; color: #000; border: none; padding: 12px 30px; font-family: 'Press Start 2P', cursive; font-size: 8px; cursor: pointer; box-shadow: 0 4px 0 #0a0a0a; }
        .overlay button:active { transform: translateY(4px); box-shadow: none; }
        .pause-text { position: absolute; color: #ff0; font-size: 12px; text-shadow: 0 0 10px #ff0; display: none; z-index: 10; }
        .pause-text.show { display: block; animation: blink 0.5s infinite; }
        .controls { margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .dpad-area { display: flex; align-items: center; gap: 5px; }
        .dpad-vertical { display: flex; flex-direction: column; gap: 5px; }
        .btn { background: #222; border: none; border-radius: 50%; color: #444; font-family: 'Press Start 2P', cursive; cursor: pointer; box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1), inset -2px -2px 5px rgba(0,0,0,0.5), 3px 3px 5px rgba(0,0,0,0.5); transition: all 0.1s; }
        .btn:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); transform: scale(0.95); }
        .btn-direction { width: 45px; height: 45px; font-size: 16px; color: #666; }
        .btn-up { border-radius: 50% 50% 5px 5px; }
        .btn-down { border-radius: 5px 5px 50% 50%; }
        .btn-left, .btn-right { border-radius: 5px; }
        .btn-rotate { width: 40px; height: 40px; font-size: 8px; background: #8b0000; color: #ff4444; border-radius: 50%; }
        .btn-drop { width: 50px; height: 80px; font-size: 6px; background: #00008b; color: #4444ff; border-radius: 10px; }
        .function-area { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .difficulty-row { display: flex; align-items: center; gap: 8px; }
        .difficulty-row label { color: #0f0; font-size: 6px; text-shadow: 0 0 5px #0f0; }
        .difficulty-row select { background: #001100; color: #0f0; border: 2px solid #0f0; padding: 5px; font-family: 'Press Start 2P', cursive; font-size: 6px; border-radius: 5px; }
        .btn-pause, .btn-start { width: 50px; height: 30px; font-size: 6px; background: #444; color: #888; border-radius: 10px; }
        .brand { color: #0f0; font-size: 8px; text-shadow: 0 0 10px #0f0; margin-top: 10px; letter-spacing: 2px; }
        .brand span { color: #f00; text-shadow: 0 0 10px #f00; }
        .led { width: 8px; height: 8px; border-radius: 50%; background: #333; margin-top: 8px; margin-left: auto; margin-right: auto; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.5); }
        .led.on { background: #0f0; box-shadow: 0 0 10px #0f0, 0 0 20px #0f0; }
        .sound-toggle { display: flex; align-items: center; gap: 5px; }
        .sound-toggle label { color: #0f0; font-size: 6px; text-shadow: 0 0 5px #0f0; }
        .sound-toggle input { width: 15px; height: 15px; accent-color: #0f0; }
    </style>
</head>
<body>
    <div class="game-boy">
        <div class="screen-border">
            <div class="screen-inner">
                <div class="header">
                    <div class="header-item">
                        <div class="header-label">分数</div>
                        <div class="header-value" id="score">0</div>
                    </div>
                    <div class="header-item">
                        <div class="header-label">等级</div>
                        <div class="header-value" id="level">1</div>
                    </div>
                    <div class="header-item">
                        <div class="header-label">行数</div>
                        <div class="header-value" id="lines">0</div>
                    </div>
                </div>
                <div class="game-area">
                    <div style="position: relative;">
                        <canvas id="gameCanvas" width="180" height="360"></canvas>
                        <div class="pause-text" id="pauseText">暂停</div>
                    </div>
                    <div class="preview-box">
                        <div class="preview-label">下一个</div>
                        <canvas id="previewCanvas" width="60" height="60"></canvas>
                    </div>
                </div>
                <div class="led" id="led"></div>
            </div>
        </div>
    </div>
    <div class="controls">
        <div class="dpad-area">
            <div class="dpad-vertical">
                <button class="btn btn-direction btn-up" id="upBtn">▲</button>
                <div style="display: flex; gap: 5px;">
                    <button class="btn btn-direction btn-left" id="leftBtn">◀</button>
                    <button class="btn btn-direction btn-down" id="downBtn">▼</button>
                    <button class="btn btn-direction btn-right" id="rightBtn">▶</button>
                </div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 5px; margin-left: 10px;">
                <button class="btn btn-rotate" id="rotateBtn">旋转</button>
                <button class="btn btn-drop" id="hardDropBtn">下落</button>
            </div>
        </div>
    </div>
    <div class="function-area">
        <div class="difficulty-row">
            <label>难度</label>
            <select id="difficulty">
                <option value="800">简单</option>
                <option value="500" selected>普通</option>
                <option value="300">困难</option>
                <option value="150">专家</option>
            </select>
        </div>
        <div class="sound-toggle">
            <input type="checkbox" id="soundOn" checked>
            <label>音效</label>
        </div>
        <button class="btn btn-pause" id="pauseBtn">暂停</button>
        <button class="btn btn-start" id="startBtn">开始</button>
    </div>
    <div class="brand">俄罗斯方块</div>
    <div class="overlay" id="gameOverOverlay">
        <h1>游戏结束</h1>
        <p id="finalScore">分数: 0</p>
        <button id="restartBtn">重新开始</button>
    </div>
    <script>
        const COLS = 10;
        const ROWS = 20;
        const COLORS = [null, '#00ffff', '#ffff00', '#ff00ff', '#00ff00', '#ff0000', '#0066ff', '#ff8800'];
        const SHAPES = [[], [[1,1,1,1]], [[2,2],[2,2]], [[0,3,0],[3,3,3]], [[0,4,4],[4,4,0]], [[5,5,0],[0,5,5]], [[6,0,0],[6,6,6]], [[0,0,7],[7,7,7]]];
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let soundEnabled = true;
        
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        
        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            switch(type) {
                case 'move':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now);
                    osc.stop(now + 0.05);
                    break;
                case 'rotate':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.setValueAtTime(500, now + 0.03);
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                    osc.start(now);
                    osc.stop(now + 0.08);
                    break;
                case 'drop':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    break;
                case 'clear':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(262, now);
                    osc.frequency.setValueAtTime(330, now + 0.08);
                    osc.frequency.setValueAtTime(392, now + 0.16);
                    osc.frequency.setValueAtTime(523, now + 0.24);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                    break;
                case 'clear2':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(330, now);
                    osc.frequency.setValueAtTime(415, now + 0.08);
                    osc.frequency.setValueAtTime(494, now + 0.16);
                    osc.frequency.setValueAtTime(659, now + 0.24);
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now);
                    osc.stop(now + 0.5);
                    break;
                case 'clear3':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(392, now);
                    osc.frequency.setValueAtTime(494, now + 0.08);
                    osc.frequency.setValueAtTime(587, now + 0.16);
                    osc.frequency.setValueAtTime(784, now + 0.24);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                    osc.start(now);
                    osc.stop(now + 0.6);
                    break;
                case 'clear4':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.setValueAtTime(659, now + 0.06);
                    osc.frequency.setValueAtTime(784, now + 0.12);
                    osc.frequency.setValueAtTime(1047, now + 0.18);
                    osc.frequency.setValueAtTime(784, now + 0.24);
                    osc.frequency.setValueAtTime(1047, now + 0.30);
                    osc.frequency.setValueAtTime(1319, now + 0.36);
                    osc.frequency.setValueAtTime(1568, now + 0.42);
                    gain.gain.setValueAtTime(0.35, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.7);
                    osc.start(now);
                    osc.stop(now + 0.7);
                    break;
                case 'gameover':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(392, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.8);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    osc.start(now);
                    osc.stop(now + 0.8);
                    break;
                case 'levelup':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.setValueAtTime(554, now + 0.1);
                    osc.frequency.setValueAtTime(659, now + 0.2);
                    osc.frequency.setValueAtTime(880, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now);
                    osc.stop(now + 0.5);
                    break;
                case 'start':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.setValueAtTime(659, now + 0.1);
                    osc.frequency.setValueAtTime(784, now + 0.2);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
            }
        }
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const previewCanvas = document.getElementById('previewCanvas');
        const previewCtx = previewCanvas.getContext('2d');
        const BLOCK_SIZE = canvas.width / COLS;
        const PREVIEW_BLOCK_SIZE = previewCanvas.width / 5;
        
        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let lines = 0;
        let baseSpeed = 500;
        let isPlaying = false;
        let isPaused = false;
        let isGameOver = false;
        let gameLoop = null;
        let clearingLines = [];
        let clearAnimationFrame = 0;
        
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const linesEl = document.getElementById('lines');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const pauseText = document.getElementById('pauseText');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const difficultySelect = document.getElementById('difficulty');
        const led = document.getElementById('led');
        const soundToggle = document.getElementById('soundOn');
        
        soundToggle.addEventListener('change', (e) => {
            soundEnabled = e.target.checked;
            if (soundEnabled) initAudio();
        });
        
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const downBtn = document.getElementById('downBtn');
        const upBtn = document.getElementById('upBtn');
        const rotateBtn = document.getElementById('rotateBtn');
        const hardDropBtn = document.getElementById('hardDropBtn');
        
        function addTouchEvent(btn, action, soundType = null) {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (isPlaying && !isPaused && !isGameOver) {
                    if (soundType) playSound(soundType);
                    action();
                    render();
                }
            });
            btn.addEventListener('click', (e) => {
                if (isPlaying && !isPaused && !isGameOver) {
                    if (soundType) playSound(soundType);
                    action();
                    render();
                }
            });
        }
        
        addTouchEvent(leftBtn, moveLeft, 'move');
        addTouchEvent(rightBtn, moveRight, 'move');
        addTouchEvent(downBtn, moveDown, 'move');
        addTouchEvent(upBtn, rotate, 'rotate');
        addTouchEvent(rotateBtn, rotate, 'rotate');
        addTouchEvent(hardDropBtn, hardDrop, 'drop');
        
        pauseBtn.addEventListener('click', togglePause);
        pauseBtn.addEventListener('touchstart', (e) => { e.preventDefault(); togglePause(); });
        
        startBtn.addEventListener('click', () => {
            initAudio();
            if (!isPlaying) {
                baseSpeed = parseInt(difficultySelect.value);
                startGame();
                startBtn.textContent = '停止';
            } else {
                togglePause();
            }
        });
        
        restartBtn.addEventListener('click', () => {
            initAudio();
            baseSpeed = parseInt(difficultySelect.value);
            gameOverOverlay.classList.remove('show');
            startGame();
            startBtn.textContent = '停止';
        });
        
        document.addEventListener('keydown', (e) => {
            initAudio();
            if (!isPlaying) return;
            if (isPaused || isGameOver) {
                if (e.key === 'p' || e.key === 'P') togglePause();
                return;
            }
            switch(e.key) {
                case 'ArrowLeft':
                    moveLeft();
                    playSound('move');
                    break;
                case 'ArrowRight':
                    moveRight();
                    playSound('move');
                    break;
                case 'ArrowDown':
                    moveDown();
                    playSound('move');
                    break;
                case 'ArrowUp':
                    rotate();
                    playSound('rotate');
                    break;
                case ' ':
                    hardDrop();
                    playSound('drop');
                    e.preventDefault();
                    break;
                case 'p':
                case 'P':
                    togglePause();
                    break;
            }
            render();
        });
        
        function createPiece(type) {
            const shape = SHAPES[type].map(row => [...row]);
            return { x: Math.floor((COLS - shape[0].length) / 2), y: 0, shape: shape, type: type };
        }
        
        function getRandomPiece() {
            return createPiece(Math.floor(Math.random() * 7) + 1);
        }
        
        function checkCollision(piece, offsetX = 0, offsetY = 0) {
            for (let r = 0; r < piece.shape.length; r++) {
                for (let c = 0; c < piece.shape[r].length; c++) {
                    if (piece.shape[r][c] > 0) {
                        const newX = piece.x + c + offsetX;
                        const newY = piece.y + r + offsetY;
                        if (newX < 0 || newX >= COLS || newY >= ROWS) return true;
                        if (newY >= 0 && board[newY][newX] > 0) return true;
                    }
                }
            }
            return false;
        }
        
        function rotatePiece(piece) {
            const rows = piece.shape.length;
            const cols = piece.shape[0].length;
            const rotated = [];
            for (let c = 0; c < cols; c++) {
                rotated[c] = [];
                for (let r = rows - 1; r >= 0; r--) {
                    rotated[c].push(piece.shape[r][c]);
                }
            }
            return { ...piece, shape: rotated };
        }
        
        function lockPiece() {
            if (!currentPiece) return;
            for (let r = 0; r < currentPiece.shape.length; r++) {
                for (let c = 0; c < currentPiece.shape[r].length; c++) {
                    if (currentPiece.shape[r][c] > 0) {
                        const boardY = currentPiece.y + r;
                        const boardX = currentPiece.x + c;
                        if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                            board[boardY][boardX] = currentPiece.shape[r][c];
                        }
                    }
                }
            }
        }
        
        function clearLines() {
            let cleared = 0;
            clearingLines = [];
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(cell => cell > 0)) {
                    clearingLines.push(r);
                    cleared++;
                }
            }
            if (cleared > 0) {
                if (soundEnabled) {
                    if (cleared === 4) playSound('clear4');
                    else if (cleared === 3) playSound('clear3');
                    else if (cleared === 2) playSound('clear2');
                    else playSound('clear');
                }
                animateClear(cleared);
                return;
            }
        }
        
        function animateClear(cleared) {
            clearAnimationFrame = 0;
            const animate = () => {
                clearAnimationFrame++;
                render(true);
                if (clearAnimationFrame < 9) {
                    requestAnimationFrame(animate);
                } else {
                    for (let i = clearingLines.length - 1; i >= 0; i--) {
                        const row = clearingLines[i];
                        board.splice(row, 1);
                        board.unshift(new Array(COLS).fill(0));
                    }
                    clearingLines = [];
                    const points = [0, 100, 300, 500, 800];
                    score += points[cleared] * level;
                    lines += cleared;
                    const oldLevel = level;
                    level = Math.floor(lines / 10) + 1;
                    if (level > oldLevel && soundEnabled) {
                        playSound('levelup');
                    }
                    updateUI();
                    render();
                }
            };
            requestAnimationFrame(animate);
        }
        
        function spawnNewPiece() {
            currentPiece = nextPiece;
            nextPiece = getRandomPiece();
            if (checkCollision(currentPiece)) {
                isGameOver = true;
                clearInterval(gameLoop);
                playSound('gameover');
                led.classList.remove('on');
                finalScoreEl.textContent = '分数: ' + score;
                gameOverOverlay.classList.add('show');
                startBtn.textContent = '开始';
            }
            renderPreview();
        }
        
        function move(dx, dy) {
            if (!currentPiece || isPaused || isGameOver) return false;
            if (!checkCollision(currentPiece, dx, dy)) {
                currentPiece.x += dx;
                currentPiece.y += dy;
                return true;
            } else if (dy > 0) {
                lockPiece();
                clearLines();
                spawnNewPiece();
            }
            return false;
        }
        
        function moveLeft() { move(-1, 0); }
        function moveRight() { move(1, 0); }
        function moveDown() { move(0, 1); }
        
        function rotate() {
            if (!currentPiece || isPaused || isGameOver) return;
            const rotated = rotatePiece(currentPiece);
            if (!checkCollision(rotated)) currentPiece = rotated;
            else if (!checkCollision({ ...rotated, x: rotated.x - 1 })) currentPiece = { ...rotated, x: rotated.x - 1 };
            else if (!checkCollision({ ...rotated, x: rotated.x + 1 })) currentPiece = { ...rotated, x: rotated.x + 1 };
        }
        
        function hardDrop() {
            if (!currentPiece || isPaused || isGameOver) return;
            while (!checkCollision(currentPiece, 0, 1)) {
                currentPiece.y++;
                score += 2;
            }
            updateUI();
            lockPiece();
            clearLines();
            spawnNewPiece();
        }
        
        function togglePause() {
            if (!isPlaying || isGameOver) return;
            isPaused = !isPaused;
            if (isPaused) {
                pauseText.classList.add('show');
                startBtn.textContent = '继续';
                pauseBtn.textContent = '继续';
                led.classList.remove('on');
            } else {
                pauseText.classList.remove('show');
                startBtn.textContent = '停止';
                pauseBtn.textContent = '暂停';
                led.classList.add('on');
                startGameLoop();
            }
        }
        
        function startGame() {
            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
            score = 0;
            level = 1;
            lines = 0;
            isPlaying = true;
            isPaused = false;
            isGameOver = false;
            clearingLines = [];
            playSound('start');
            nextPiece = getRandomPiece();
            spawnNewPiece();
            updateUI();
            pauseText.classList.remove('show');
            gameOverOverlay.classList.remove('show');
            led.classList.add('on');
            startGameLoop();
        }
        
        function startGameLoop() {
            if (gameLoop) clearInterval(gameLoop);
            const speed = Math.max(100, baseSpeed - (level - 1) * 50);
            gameLoop = setInterval(() => {
                if (!isPaused && !isGameOver && clearingLines.length === 0) {
                    move(0, 1);
                    render();
                }
            }, speed);
        }
        
        function updateUI() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            linesEl.textContent = lines;
        }
        
        function drawBlock(ctx, x, y, colorIndex, blockSize, isClearing = false) {
            const color = COLORS[colorIndex];
            if (!color) return;
            const padding = 1;
            if (isClearing) {
                const flash = Math.sin(clearAnimationFrame * Math.PI / 3) > 0;
                ctx.fillStyle = flash ? '#fff' : color;
                ctx.fillRect(x * blockSize + padding, y * blockSize + padding, blockSize - padding * 2, blockSize - padding * 2);
            } else {
                ctx.fillStyle = color;
                ctx.fillRect(x * blockSize + padding, y * blockSize + padding, blockSize - padding * 2, blockSize - padding * 2);
                ctx.fillStyle = '#000';
                ctx.fillRect(x * blockSize + padding, y * blockSize + padding, blockSize - padding * 2, 1);
                ctx.fillRect(x * blockSize + padding, y * blockSize + padding, 1, blockSize - padding * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.fillRect(x * blockSize + padding + 2, y * blockSize + padding + 2, 2, 2);
            }
        }
        
        function render(isClearingFrame = false) {
            ctx.fillStyle = '#001100';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#002200';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c] > 0) {
                        const isClearing = clearingLines.includes(r);
                        drawBlock(ctx, c, r, board[r][c], BLOCK_SIZE, isClearing);
                    }
                }
            }
            if (currentPiece && clearingLines.length === 0) {
                for (let r = 0; r < currentPiece.shape.length; r++) {
                    for (let c = 0; c < currentPiece.shape[r].length; c++) {
                        if (currentPiece.shape[r][c] > 0) {
                            drawBlock(ctx, currentPiece.x + c, currentPiece.y + r, currentPiece.shape[r][c], BLOCK_SIZE);
                        }
                    }
                }
            }
        }
        
        function renderPreview() {
            previewCtx.fillStyle = '#001100';
            previewCtx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
            if (!nextPiece) return;
            const offsetX = (5 - nextPiece.shape[0].length) / 2;
            const offsetY = (5 - nextPiece.shape.length) / 2;
            for (let r = 0; r < nextPiece.shape.length; r++) {
                for (let c = 0; c < nextPiece.shape[r].length; c++) {
                    if (nextPiece.shape[r][c] > 0) {
                        drawBlock(previewCtx, offsetX + c, offsetY + r, nextPiece.shape[r][c], PREVIEW_BLOCK_SIZE);
                    }
                }
            }
        }
        
        render();
        renderPreview();
    </script>
</body>
</html>
